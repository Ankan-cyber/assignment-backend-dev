version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: cloudnotepro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./cloudnotepro-backend
    container_name: cloudnotepro-api
    restart: unless-stopped
    env_file:
      - ./cloudnotepro-backend/.env
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/cloudnotepro
    ports:
      - "5000:5000"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000',()=>process.exit(0)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  mongo_data:
